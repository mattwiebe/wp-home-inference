name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -proot" --health-interval=10s --health-timeout=10s --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install svn
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: mysql

      - uses: ramsey/composer-install@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install WordPress test suite
        run: composer test:install-wp

      - name: Verify PHP
        run: |
          composer lint
          composer test

      - name: Verify Node
        run: |
          npm run lint
          npm test

      - name: Build plugin package
        run: npm run build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-home-inference
          path: dist/*

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Notify Packagist
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -z "${PACKAGIST_USERNAME}" ] || [ -z "${PACKAGIST_API_TOKEN}" ]; then
            echo "Packagist secrets not configured; skipping notification."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H 'content-type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/mattwiebe/wp-home-inference"}}'
