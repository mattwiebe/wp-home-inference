name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -proot" --health-interval=10s --health-timeout=10s --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - name: Install svn
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: mysql

      - uses: ramsey/composer-install@v4
      - name: Install WordPress test suite
        run: composer test:install-wp

      - name: Verify PHP
        run: |
          composer lint
          composer test

      - name: Build plugin package
        run: bash scripts/build-plugin-zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: mwlai-connector
          path: dist/*

      - name: Deploy to WordPress.org
        id: wordpress_org_deploy
        if: startsWith(github.ref, 'refs/tags/')
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: mw-local-ai-connector
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        with:
          generate-zip: true

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
            ${{ steps.wordpress_org_deploy.outputs.zip-path }}
