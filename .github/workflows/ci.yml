name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Lint PHP
        run: composer lint

      - name: Run PHP tests
        run: composer test

  node:
    name: Node
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Node
        run: npm run lint

      - name: Run Node tests
        run: npm test
